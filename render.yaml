services:
  - type: web
    name: property-shield-web
    env: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: property-shield-db
          property: connectionString

databases:
  - name: property-shield-db
    plan: starter
